name: Build busybox and git auto commit

on:
  workflow_dispatch:

env:
  RISCV32_TOOLCHAIN_URL: https://github.com/riscv-collab/riscv-gnu-toolchain/releases/latest/download/riscv32-glibc-ubuntu-24.04-gcc.tar.xz
  BUSYBOX_URL: https://busybox.net/downloads/busybox-1.36.1.tar.bz2
  BUSYBOX_DIRNAME: busybox-1.36.1

jobs:
  # 阶段一：矩阵并行编译
  compile:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false # 即使某个架构失败，也不中断其他架构的编译
      matrix:
        include:
          - arch: x86_64  ; prefix: ''                        ; pkg: 'build-essential'             ; suffix: 'x86_64-linux-gnu'
          - arch: aarch64 ; prefix: 'aarch64-linux-gnu-'      ; pkg: 'g++-aarch64-linux-gnu'       ; suffix: 'aarch64-linux-gnu'
          - arch: arm     ; prefix: 'arm-linux-gnueabi-'      ; pkg: 'g++-arm-linux-gnueabi'       ; suffix: 'arm-linux-gnueabi'
          - arch: arm     ; prefix: 'arm-linux-gnueabihf-'    ; pkg: 'g++-arm-linux-gnueabihf'     ; suffix: 'arm-linux-gnueabihf'
          - arch: mips    ; prefix: 'mips-linux-gnu-'         ; pkg: 'g++-mips-linux-gnu'          ; suffix: 'mips-linux-gnu'
          - arch: mips    ; prefix: 'mipsel-linux-gnu-'       ; pkg: 'g++-mipsel-linux-gnu'        ; suffix: 'mipsel-linux-gnu'
          - arch: mips64  ; prefix: 'mips64-linux-gnuabi64-'  ; pkg: 'g++-mips64-linux-gnuabi64'   ; suffix: 'mips64-linux-gnuabi64'
          - arch: mips64  ; prefix: 'mips64el-linux-gnuabi64-'; pkg: 'g++-mips64el-linux-gnuabi64' ; suffix: 'mips64el-linux-gnuabi64'
          - arch: powerpc ; prefix: 'powerpc64le-linux-gnu-'  ; pkg: 'g++-powerpc64le-linux-gnu'   ; suffix: 'powerpc64le-linux-gnu'
          - arch: riscv   ; prefix: 'riscv64-linux-gnu-'      ; pkg: 'g++-riscv64-linux-gnu'       ; suffix: 'riscv64-linux-gnu'
          - arch: riscv   ; prefix: 'riscv32-linux-gnu-'      ; pkg: 'riscv32-custom'              ; suffix: 'riscv32-linux-gnu'

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wget make ca-certificates bzip2
          # 动态安装对应的交叉编译环境，避免无意义的全局安装，提升速度
          if [ "${{ matrix.pkg }}" != "riscv32-custom" ]; then
            sudo apt-get install -y --no-install-recommends ${{ matrix.pkg }}
          fi

      - name: Setup Custom RISC-V 32 Toolchain
        if: matrix.pkg == 'riscv32-custom'
        run: |
          sudo mkdir -p /usr/local/rv32
          wget -O- -q $RISCV32_TOOLCHAIN_URL | sudo tar -C /usr/local/rv32 --strip-components=1 -xf -
          sudo ln -sf /usr/local/rv32/sysroot /usr/riscv32-linux-gnu
          sudo ln -sf /usr/local/rv32/bin/riscv32-unknown-linux-gnu-ar /usr/bin/riscv32-linux-gnu-ar
          sudo ln -sf /usr/local/rv32/bin/riscv32-unknown-linux-gnu-strip /usr/bin/riscv32-linux-gnu-strip
          echo '/usr/local/rv32/bin/riscv32-unknown-linux-gnu-gcc -L/usr/riscv32-linux-gnu "$@"' | sudo tee /usr/bin/riscv32-linux-gnu-gcc > /dev/null
          sudo chmod +x /usr/bin/riscv32-linux-gnu-gcc

      - name: Build BusyBox
        run: |
          wget -O- -q $BUSYBOX_URL | tar jxf -
          cd $BUSYBOX_DIRNAME
          export ARCH=${{ matrix.arch }}
          export CROSS_COMPILE=${{ matrix.prefix }}
          make defconfig
          sed -e 's/.*\<CONFIG_STATIC\>.*/CONFIG_STATIC=y/' -i .config
          make -j$(($(nproc)+1))
          
          # 【核心优化】使用对应架构的 strip 移除二进制文件中的调试符号和无用信息，大幅缩减体积
          if [ -n "${{ matrix.prefix }}" ]; then
            ${{ matrix.prefix }}strip busybox || true
          else
            strip busybox || true
          fi
          
          mv busybox ../busybox-${{ matrix.suffix }}

      # 上传当前架构编译好的单文件作为临时产物
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.suffix }}
          path: busybox-${{ matrix.suffix }}
          retention-days: 1

  # 阶段二：合并收集与提交
  commit:
    needs: compile # 等待矩阵中所有架构全部编译完成
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          path: main

      # v4 版本的 pattern 功能可以一次性拉取上面并行的 11 个产物
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          merge-multiple: true
          path: main/

      - name: Install QEMU for README generation
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-user-static file

      - name: Update README.md
        working-directory: main
        run: |
          chmod +x busybox-*
          mv README.md README.md.old
          head -n2 README.md.old > README.md
          echo -e "busybox v${BUSYBOX_DIRNAME##busybox-} static binaries\n" >> README.md
          echo '```console' >> README.md
          /bin/bash -c 'PS4="$ "; set -x; file busybox-*' &>> README.md
          echo -e '```\n' >> README.md
          echo '# bundled commands' >> README.md
          echo '```console' >> README.md
          /bin/bash -c 'PS4="$ "; set -x; qemu-aarch64-static ./busybox-aarch64-linux-gnu' &>> README.md
          echo '```' >> README.md
          rm README.md.old

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          repository: ./main
          commit_message: "Auto-build BusyBox 1.36.1 (Matrix Optimized)"
