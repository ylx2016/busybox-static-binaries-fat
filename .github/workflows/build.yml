name: Build busybox and git auto commit

on:
  workflow_dispatch:

env:
  RISCV32_TOOLCHAIN_URL: https://github.com/riscv-collab/riscv-gnu-toolchain/releases/latest/download/riscv32-glibc-ubuntu-24.04-gcc.tar.xz
  BUSYBOX_URL: https://busybox.net/downloads/busybox-1.36.1.tar.bz2
  BUSYBOX_DIRNAME: busybox-1.36.1

jobs:
  compile:
    # 这里的 runs-on 会根据下面 matrix 里的 os 动态变化！
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # 其他所有架构：使用稳定可靠的 ubuntu-22.04
          - { arch: x86_64,  prefix: '',                         pkg: 'build-essential',             suffix: 'x86_64-linux-gnu',      os: ubuntu-22.04 }
          - { arch: aarch64, prefix: 'aarch64-linux-gnu-',       pkg: 'g++-aarch64-linux-gnu',       suffix: 'aarch64-linux-gnu',     os: ubuntu-22.04 }
          - { arch: arm,     prefix: 'arm-linux-gnueabi-',       pkg: 'g++-arm-linux-gnueabi',       suffix: 'arm-linux-gnueabi',     os: ubuntu-22.04 }
          - { arch: arm,     prefix: 'arm-linux-gnueabihf-',     pkg: 'g++-arm-linux-gnueabihf',     suffix: 'arm-linux-gnueabihf',   os: ubuntu-22.04 }
          - { arch: mips,    prefix: 'mips-linux-gnu-',          pkg: 'g++-mips-linux-gnu',          suffix: 'mips-linux-gnu',        os: ubuntu-22.04 }
          - { arch: mips,    prefix: 'mipsel-linux-gnu-',        pkg: 'g++-mipsel-linux-gnu',        suffix: 'mipsel-linux-gnu',      os: ubuntu-22.04 }
          - { arch: mips64,  prefix: 'mips64-linux-gnuabi64-',   pkg: 'g++-mips64-linux-gnuabi64',   suffix: 'mips64-linux-gnuabi64', os: ubuntu-22.04 }
          - { arch: mips64,  prefix: 'mips64el-linux-gnuabi64-', pkg: 'g++-mips64el-linux-gnuabi64', suffix: 'mips64el-linux-gnuabi64', os: ubuntu-22.04 }
          - { arch: powerpc, prefix: 'powerpc64le-linux-gnu-',   pkg: 'g++-powerpc64le-linux-gnu',   suffix: 'powerpc64le-linux-gnu', os: ubuntu-22.04 }
          - { arch: riscv,   prefix: 'riscv64-linux-gnu-',       pkg: 'g++-riscv64-linux-gnu',       suffix: 'riscv64-linux-gnu',     os: ubuntu-22.04 }
          # 唯独 RISC-V 32：使用最新的 ubuntu-24.04 以兼容其高版本工具链
          - { arch: riscv,   prefix: 'riscv32-linux-gnu-',       pkg: 'riscv32-custom',              suffix: 'riscv32-linux-gnu',     os: ubuntu-24.04 }

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wget make ca-certificates bzip2 xz-utils
          if [ "${{ matrix.pkg }}" != "riscv32-custom" ]; then
            sudo apt-get install -y --no-install-recommends ${{ matrix.pkg }}
          fi

      - name: Setup Custom RISC-V 32 Toolchain
        if: matrix.pkg == 'riscv32-custom'
        run: |
          sudo mkdir -p /usr/local/rv32
          wget -O- -q $RISCV32_TOOLCHAIN_URL | sudo tar -C /usr/local/rv32 --strip-components=1 -Jxf -
          sudo ln -sf /usr/local/rv32/sysroot /usr/riscv32-linux-gnu
          sudo ln -sf /usr/local/rv32/bin/riscv32-unknown-linux-gnu-ar /usr/bin/riscv32-linux-gnu-ar
          sudo ln -sf /usr/local/rv32/bin/riscv32-unknown-linux-gnu-strip /usr/bin/riscv32-linux-gnu-strip
          echo '/usr/local/rv32/bin/riscv32-unknown-linux-gnu-gcc -L/usr/riscv32-linux-gnu "$@"' | sudo tee /usr/bin/riscv32-linux-gnu-gcc > /dev/null
          sudo chmod +x /usr/bin/riscv32-linux-gnu-gcc

      - name: Build BusyBox
        run: |
          wget -O- -q $BUSYBOX_URL | tar jxf -
          cd $BUSYBOX_DIRNAME
          export ARCH=${{ matrix.arch }}
          export CROSS_COMPILE=${{ matrix.prefix }}
          make defconfig
          
          # 开启静态编译
          sed -i 's/.*CONFIG_STATIC.*/CONFIG_STATIC=y/' .config
          # 关闭警告转错误
          sed -i 's/.*CONFIG_WERROR.*/# CONFIG_WERROR is not set/' .config
          # 强制使用内置加密库，避免新版 Ubuntu 找不到 libcrypt.a 的 Fatal Error
          sed -i 's/.*CONFIG_USE_BB_CRYPT.*/CONFIG_USE_BB_CRYPT=y/' .config
          
          yes "" | make oldconfig
          
          # 加入豁免 GCC 14 严格语法的指令
          make -j$(($(nproc)+1)) EXTRA_CFLAGS="-Wno-error -Wno-implicit-function-declaration -Wno-incompatible-pointer-types"
          
          if [ -n "${{ matrix.prefix }}" ]; then
            ${{ matrix.prefix }}strip busybox || true
          else
            strip busybox || true
          fi
          
          mv busybox ../busybox-${{ matrix.suffix }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.suffix }}
          path: busybox-${{ matrix.suffix }}
          retention-days: 1

  commit:
    needs: compile
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          path: main

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          merge-multiple: true
          path: main/

      - name: Install QEMU for README generation
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-user-static file

      - name: Update README.md
        working-directory: main
        run: |
          chmod +x busybox-*
          mv README.md README.md.old || touch README.md.old
          head -n2 README.md.old > README.md
          echo -e "busybox v${BUSYBOX_DIRNAME##busybox-} static binaries\n" >> README.md
          echo '```console' >> README.md
          /bin/bash -c 'PS4="$ "; set -x; file busybox-*' &>> README.md
          echo -e '```\n' >> README.md
          echo '# bundled commands' >> README.md
          echo '```console' >> README.md
          /bin/bash -c 'PS4="$ "; set -x; qemu-aarch64-static ./busybox-aarch64-linux-gnu' &>> README.md
          echo '```' >> README.md
          rm -f README.md.old

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          repository: ./main
          commit_message: "Auto-build BusyBox 1.36.1 (Matrix OS OS-Split Strategy)"
